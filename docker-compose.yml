services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feedback}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feedback}
      POSTGRES_DB: ${POSTGRES_DB:-feedback_ai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  db-init:
    build:
      context: .
      target: db-init
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-feedback}:${POSTGRES_PASSWORD:-feedback}@postgres:5432/${POSTGRES_DB:-feedback_ai}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-feedback}:${POSTGRES_PASSWORD:-feedback}@postgres:5432/${POSTGRES_DB:-feedback_ai}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-secret-change-before-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      EMAIL_FROM: ${EMAIL_FROM:-Feedback AI <no-reply@example.com>}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-local}
      POSTMARK_SERVER_TOKEN: ${POSTMARK_SERVER_TOKEN:-}
      POSTMARK_MESSAGE_STREAM: ${POSTMARK_MESSAGE_STREAM:-outbound}
      NOTIFICATION_WORKER_SECRET: ${NOTIFICATION_WORKER_SECRET:-local-notification-worker-secret-change-me}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llama:8080/v1/}
      LLM_MODEL: ${LLM_MODEL:-qwen3-4b}
      AI_CHAT_TIMEOUT_MS: ${AI_CHAT_TIMEOUT_MS:-180000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      DEMO_AUTH_FALLBACK: "false"
    ports:
      - "3000:3000"
    volumes:
      - avatar_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  notification-worker:
    build:
      context: .
      target: runner
    restart: unless-stopped
    command: ["node", "scripts/notification-worker.mjs"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      NOTIFICATION_WORKER_URL: http://app:3000/api/internal/notifications/process
      NOTIFICATION_WORKER_SECRET: ${NOTIFICATION_WORKER_SECRET:-local-notification-worker-secret-change-me}
      NOTIFICATION_WORKER_INTERVAL_MS: ${NOTIFICATION_WORKER_INTERVAL_MS:-10000}

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-b9445
    profiles: ["ai"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HF_HOME: /models/huggingface
    command:
      [
        "-hf",
        "${LLAMA_HF_MODEL:-Qwen/Qwen3-4B-GGUF:Q4_K_M}",
        "--alias",
        "${LLM_MODEL:-qwen3-4b}",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "-c",
        "8192",
        "-n",
        "450",
        "--jinja"
      ]
    volumes:
      - llama_models:/models

volumes:
  postgres_data:
  avatar_uploads:
  llama_models:
